global:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - pi-storage1
                - pi-storage2
                - pi-storage3

led-sniffer:
  enabled: true

  image:
    repository: cubbit/neonswarm-led-sniffer
    tag: "latest"
    pullPolicy: Always

  imagePullSecrets:
    - name: regcred

  # Capture parameters.
  #
  # The sniffer watches the ``cni0`` bridge, which sees raw TCP traffic
  # entering or leaving pods on this node (before flannel VXLAN
  # encapsulation). The BPF filter restricts both source and destination
  # to the flannel pod CIDR, so external NodePort traffic, Netbird and
  # LAN traffic are structurally excluded.
  source: ""                   # optional extra BPF 'host <ip>' filter
  port: ""                     # optional TCP port (empty = any pod-to-pod)
  interface: cni0              # CNI bridge on K3s/flannel
  pod_cidr: 10.42.0.0/16       # flannel pod CIDR; matches src AND dst
  threshold: 30K               # bytes accumulated before animation fires
  delay: 3.0                   # seconds of inactivity before stopping
  filter_size: 200B            # min TCP payload to count (drops ACKs, keepalives)

  # LED / animation parameters
  led_count: 30
  led_pin: D18
  animation_color: "#0065FF"
  animation_speed: 0.09
  animation_spacing: 3

  verbose: false

  privileged: true
  hostNetwork: true

  devices:
    # Note: no `type:` here. On Pi 5 these are not character devices by
    # kubelet's hostPath type check (gpiomem is a mem driver, spidev can
    # vary by kernel/dtb). Leaving the type unset lets kubelet mount them
    # as-is.
    - name: gpiomem
      hostPath: /dev/gpiomem
    - name: spidev
      hostPath: /dev/spidev0.0

  resources:
    requests:
      cpu: 30m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 128Mi

  startupProbe:
    enabled: true
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 3
  livenessProbe:
    enabled: true
    periodSeconds: 15
    failureThreshold: 2
    timeoutSeconds: 3
    stalenessSeconds: 30

lcd-storage:
  enabled: true
  image:
    repository: cubbit/neonswarm-lcd-storage
    tag: latest
    pullPolicy: Always

  namespace: neonswarm
  prefix: agent

  path: /
  address: 0x27
  buttonPin: 17
  interval: 5.0
  verbose: false

  imagePullSecrets:
    - name: regcred

  privileged: true

  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  # Startup probe gates the liveness probe until the supervisor loop has
  # touched /tmp/healthy at least once. Worst-case init retry window is
  # ~3 min, so 30 × 10s = 5 min budget before kubelet gives up.
  startupProbe:
    enabled: true
    periodSeconds: 10
    failureThreshold: 30
    timeoutSeconds: 3
  # Liveness probe checks that /tmp/healthy was touched recently.
  # The supervisor loop touches this file on every iteration (success or
  # error), so a stale marker indicates the loop itself is hung.
  livenessProbe:
    enabled: true
    periodSeconds: 15
    failureThreshold: 2
    timeoutSeconds: 3
    stalenessSeconds: 30

  devices:
    - name: i2c-bus
      hostPath: /dev/i2c-1
      mountPath: /dev/i2c-1
      type: CharDevice
    - name: gpiochip4
      hostPath: /dev/gpiochip4
      mountPath: /dev/gpiochip4
      type: CharDevice

agent:
  image:
    repository: cubbit/agent
    tag: latest
    pullPolicy: Always

  port: 4000

  swarm:
    enabled: true
    agents:
      - name: agent1
        secret: <agent-secret-1>
        machineId: <agent-machineId-1>
        nodeName: pi-storage1
      - name: agent2
        secret: <agent-secret-2>
        machineId: <agent-machineId-2>
        nodeName: pi-storage2
      - name: agent3
        secret: <agent-secret-3>
        machineId: <agent-machineId-3>

