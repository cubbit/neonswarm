{{/*
One Secret per swarm agent, containing the agent's credentials. The
Deployment references these via ``envFrom.secretRef`` so the rendered
pod spec no longer exposes plaintext secrets in ``kubectl get deploy -o yaml``.
*/}}
{{- range .Values.swarm.agents }}
{{- $ctx := dict "root" $ "agent" . }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent.fullname" $ctx }}-credentials
  labels:
    {{- include "agent.labels" $ctx | nindent 4 }}
type: Opaque
stringData:
  AGENT_SECRET: {{ .secret | quote }}
  MACHINE_ID: {{ .machineId | quote }}
{{- end }}
