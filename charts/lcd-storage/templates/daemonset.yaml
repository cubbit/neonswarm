apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "lcd-storage.fullname" . }}
  labels:
    {{- include "lcd-storage.labels" . | nindent 4 }}
spec:
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.updateStrategy.maxUnavailable | default 1 }}
  minReadySeconds: {{ .Values.minReadySeconds | default 10 }}
  selector:
    matchLabels:
      {{- include "lcd-storage.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lcd-storage.labels" . | nindent 8 }}
    spec:
      affinity:
        nodeAffinity:
          {{- toYaml .Values.global.nodeAffinity | nindent 10 }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "lcd-storage.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
      containers:
        - name: lcd-storage
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            # I2C + GPIO access via /dev/i2c-1 + gpiochip4 requires CAP_SYS_RAWIO
            # and access to /dev, which privileged: true provides in full.
            privileged: {{ .Values.privileged }}
          command: ["lcd-storage"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          args:
            - "--path"
            - "{{ .Values.path }}"
            - "--namespace"
            - "{{ .Values.namespace }}"
            - "--prefix"
            - "{{ .Values.prefix }}"
            - "--address"
            - "{{ .Values.address }}"
            - "--button-pin"
            - "{{ .Values.buttonPin }}"
            - "--interval"
            - "{{ .Values.interval }}"
            {{- if .Values.nodeName }}
            - "--node-name"
            - "{{ .Values.nodeName }}"
            {{- end }}
            {{- if .Values.verbose }}
            - "--verbose"
            {{- end }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and .Values.startupProbe .Values.startupProbe.enabled }}
          # Gates the liveness probe until the first health file touch.
          # Tolerates the worst-case init retry window (~3 min).
          startupProbe:
            exec:
              command: ["test", "-f", "/tmp/healthy"]
            periodSeconds: {{ .Values.startupProbe.periodSeconds | default 10 }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold | default 30 }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds | default 3 }}
          {{- end }}
          {{- if and .Values.livenessProbe .Values.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'test -f /tmp/healthy && test $(( $(date +%s) - $(stat -c %Y /tmp/healthy) )) -lt {{ .Values.livenessProbe.stalenessSeconds | default 30 }}'
            periodSeconds: {{ .Values.livenessProbe.periodSeconds | default 15 }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold | default 2 }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds | default 3 }}
          {{- end }}
          {{- with .Values.devices }}
          volumeMounts:
            {{- range . }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              {{- if .readOnly }}
              readOnly: {{ .readOnly }}
              {{- end }}
            {{- end }}
          {{- end }}
      {{- with .Values.devices }}
      volumes:
        {{- range . }}
        - name: {{ .name }}
          hostPath:
            path: {{ .hostPath }}
            {{- if .type }}
            type: {{ .type }}
            {{- end }}
        {{- end }}
      {{- end }}
