apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: lcd-storage-reader-binding
  namespace: {{ .Release.Namespace }}
subjects:
  - kind: ServiceAccount
    name: lcd-storage-sa
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: lcd-storage-reader
  apiGroup: rbac.authorization.k8s.io

