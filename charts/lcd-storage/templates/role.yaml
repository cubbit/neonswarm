apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "lcd-storage.fullname" . }}-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lcd-storage.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs:
      - get
      - list
      - patch

