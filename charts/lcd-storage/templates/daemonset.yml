apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "lcd-storage.fullname" . }}
  labels:
    app: {{ include "lcd-storage.fullname" . }}
spec:
  selector:
    matchLabels:
      app: {{ include "lcd-storage.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "lcd-storage.fullname" . }}
    spec:
      affinity:
        nodeAffinity:
{{ toYaml .Values.global.nodeAffinity | indent 10 }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.imagePullSecrets | indent 8 }}
      {{- end }}
      containers:
        - name: lcd-storage
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            privileged: {{ .Values.privileged }}
          command: ["lcd-storage"]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          args:
            - "--path"
            - "{{ .Values.path }}"
            - "--namespace"
            - "{{ .Values.namespace }}"
            - "--prefix"
            - "{{ .Values.prefix }}"
            - "--address"
            - "{{ .Values.address }}"
            - "--button-pin"
            - "{{ .Values.buttonPin }}"
            - "--interval"
            - "{{ .Values.interval }}"
            {{- if .Values.nodeName }}
            - "--node-name"
            - "{{ .Values.nodeName }}"
            {{- end }}
            {{- if .Values.verbose }}
            - "--verbose"
            {{- end }}
          {{- with .Values.resources }}
          resources:
{{ toYaml . | indent 12 }}
          {{- end }}
          {{- if and .Values.livenessProbe .Values.livenessProbe.enabled }}
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'test -f /tmp/healthy && test $(( $(date +%s) - $(stat -c %Y /tmp/healthy) )) -lt {{ .Values.livenessProbe.stalenessSeconds | default 30 }}'
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds | default 30 }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds | default 15 }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold | default 2 }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds | default 3 }}
          {{- end }}
          {{- if .Values.devices }}
          volumeMounts:
{{- range .Values.devices }}
            - name: {{ .name }}
              mountPath: {{ .mountPath }}
              {{- if .readOnly }}
              readOnly: {{ .readOnly }}
              {{- end }}
{{- end }}
          {{- end }}
      {{- if .Values.devices }}
      volumes:
{{- range .Values.devices }}
        - name: {{ .name }}
          hostPath:
            path: {{ .hostPath }}
            {{- if .type }}
            type: {{ .type }}
            {{- end }}
{{- end }}
      {{- end }}
      serviceAccountName: lcd-storage-sa
      restartPolicy: Always
