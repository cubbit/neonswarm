apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "led-sniffer.fullname" . }}
  labels:
    app: {{ include "led-sniffer.fullname" . }}
spec:
  selector:
    matchLabels:
      app: {{ include "led-sniffer.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "led-sniffer.fullname" . }}
    spec:
      affinity:
        nodeAffinity:
          {{- toYaml .Values.global.nodeAffinity | nindent 10 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      containers:
        - name: led-sniffer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            privileged: {{ .Values.privileged }}
          args:
            {{- if .Values.verbose }}
            - "--verbose"
            {{- end }}
            {{- if .Values.source }}
            - "--source"
            - "{{ .Values.source }}"
            {{- end }}
            {{- if .Values.port }}
            - "--port"
            - "{{ .Values.port }}"
            {{- end }}
            {{- if .Values.interface }}
            - "--interface"
            - "{{ .Values.interface }}"
            {{- end }}
            {{- if .Values.pod_cidr }}
            - "--pod-cidr"
            - "{{ .Values.pod_cidr }}"
            {{- end }}
            - "--threshold"
            - "{{ .Values.threshold }}"
            - "--delay"
            - "{{ .Values.delay }}"
            - "--filter_size"
            - "{{ .Values.filter_size }}"
            - "--led-count"
            - "{{ .Values.led_count }}"
            - "--led-pin"
            - "{{ .Values.led_pin }}"
            - "--animation-color"
            - "{{ .Values.animation_color }}"
            - "--animation-speed"
            - "{{ .Values.animation_speed }}"
            - "--animation-spacing"
            - "{{ .Values.animation_spacing }}"
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and .Values.startupProbe .Values.startupProbe.enabled }}
          # Gates the liveness probe until the first health file touch.
          startupProbe:
            exec:
              command: ["test", "-f", "/tmp/healthy"]
            periodSeconds: {{ .Values.startupProbe.periodSeconds | default 10 }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold | default 30 }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds | default 3 }}
          {{- end }}
          {{- if and .Values.livenessProbe .Values.livenessProbe.enabled }}
          # Touched every supervisor iteration (success or capture error).
          # A stale marker means the loop itself is hung.
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - 'test -f /tmp/healthy && test $(( $(date +%s) - $(stat -c %Y /tmp/healthy) )) -lt {{ .Values.livenessProbe.stalenessSeconds | default 30 }}'
            periodSeconds: {{ .Values.livenessProbe.periodSeconds | default 15 }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold | default 2 }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds | default 3 }}
          {{- end }}
          volumeMounts:
            {{- range .Values.devices }}
            - name: {{ .name }}
              mountPath: {{ .hostPath }}
            {{- end }}
      volumes:
        {{- range .Values.devices }}
        - name: {{ .name }}
          hostPath:
            path: {{ .hostPath }}
            {{- if .type }}
            type: {{ .type }}
            {{- end }}
        {{- end }}
